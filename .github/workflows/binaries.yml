name: Binaries

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      upload:
        description: Upload built binaries as artifacts
        type: boolean
        default: false

jobs:
  binary:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        # `name` follows the LLVM/Rust target-triple convention
        # (`<arch>-<vendor>-<sys>-<abi>`). For Windows, `-gnu` denotes the
        # MinGW (GNU) ABI, as opposed to `-msvc`.
        include:
          - os: macos-15-intel
            name: x86_64-apple-darwin
            installable: .#dune
          - os: macos-14
            name: aarch64-apple-darwin
            installable: .#dune
          - os: ubuntu-22.04
            name: x86_64-unknown-linux-musl
            installable: .#dune-static
          - os: ubuntu-22.04
            name: x86_64-pc-windows-gnu
            installable: .#windows-static
            binary: dune.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # for git describe
      - uses: cachix/install-nix-action@v31
      - run: echo "(version $(git describe --always --dirty --abbrev=7))" >> dune-project
      - run: nix build ${{ matrix.installable }}
      - if: ${{ inputs.upload }}
        uses: actions/upload-artifact@v7
        with:
          path: result/bin/${{ matrix.binary || 'dune' }}
          name: dune-${{ matrix.name }}
  combine:
    if: ${{ inputs.upload }}
    runs-on: ubuntu-latest
    needs: binary
    steps:
      - uses: actions/upload-artifact/merge@v7
        with:
          separate-directories: true
