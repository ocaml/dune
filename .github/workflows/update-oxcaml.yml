name: Update OxCaml flake inputs

on:
  schedule:
    - cron: '0 5 * * 1' # Every Monday at 5:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-release:
    name: Update OxCaml release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: nixbuild/nix-quick-install-action@v34

      - name: Find latest OxCaml release
        id: check
        run: |
          # Fetch the opam repository to find what compiler version it pins
          opam_repo=$(mktemp -d)
          git clone --depth 1 https://github.com/oxcaml/opam-repository.git "$opam_repo"

          latest_dir=$(ls "$opam_repo/packages/ocaml-variants" | sort -V | tail -1)
          latest=$(grep -oP 'refs/tags/\K[^"]+' "$opam_repo/packages/ocaml-variants/${latest_dir}/opam" | head -1)
          opam_rev=$(git -C "$opam_repo" rev-parse HEAD)
          rm -rf "$opam_repo"

          current=$(grep -oP 'github:oxcaml/oxcaml/\K[^"]+' flake.nix | head -1)

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "opam_rev=$opam_rev" >> "$GITHUB_OUTPUT"

          if [ "$current" = "$latest" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update flake.nix and relock
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          current="${{ steps.check.outputs.current }}"
          latest="${{ steps.check.outputs.latest }}"
          opam_rev="${{ steps.check.outputs.opam_rev }}"

          # Pin oxcaml to the new release tag
          sed -i "s|github:oxcaml/oxcaml/${current}|github:oxcaml/oxcaml/${latest}|" flake.nix

          # Pin oxcaml-opam-repository to the commit that has this release
          sed -i "s|github:oxcaml/opam-repository.*\"|github:oxcaml/opam-repository/${opam_rev}\"|" flake.nix

          # Relock to resolve the updated inputs
          nix flake lock

      - name: Create PR
        if: steps.check.outputs.up_to_date == 'false'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-oxcaml-${{ steps.check.outputs.latest }}
          title: "Update OxCaml to ${{ steps.check.outputs.latest }}"
          body: |
            The OxCaml opam repository now pins release `${{ steps.check.outputs.latest }}`.

            Previously pinned: `${{ steps.check.outputs.current }}`

            This PR updates `flake.nix` to pin both `oxcaml` and `oxcaml-opam-repository`.
          commit-message: |
            Update OxCaml to ${{ steps.check.outputs.latest }}

            Signed-off-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
